<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmoni - Keranjang Belanja</title>
    <link rel="stylesheet" href="../css/keranjang.css">
    <style>
        /* Navbar styles (keranjang.css doesn't have one) */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 5%;
            background: #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,.08);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .nav-logo { display: flex; align-items: center; gap: 10px; cursor: pointer; text-decoration: none; color: inherit; }
        .nav-logo img { height: 36px; }
        .nav-logo h2 { font-size: 1.1rem; font-weight: 700; margin: 0; }
        .nav-back { color: #6b7280; font-size: .9rem; text-decoration: none; }
        .nav-back:hover { color: #1a1a1a; }
        .empty-cart { text-align: center; padding: 60px 20px; color: #9ca3af; }
        .empty-cart p { margin: 12px 0 24px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo" onclick="window.location.href='homepage.html'">
            <img src="../image/Logo no BG 1.png" alt="Logo Harmoni">
            <h2>HARMONI</h2>
        </div>
        <a href="katalog.html" class="nav-back">&larr; Lanjut belanja</a>
    </nav>

    <div class="cart-container">

        <div class="cart-box">

            <div class="cart-header">
                <div class="brand">
                    <img src="../image/Logo no BG 1.png" alt="Logo Harmoni">
                    <h2>Harmoni</h2>
                </div>
                <button class="btn-close" onclick="window.location.href='homepage.html'" title="Tutup">✕</button>
            </div>

            <h1 class="cart-title">Keranjang Anda</h1>

            <div class="cart-items" id="cartItems">
                <!-- Rendered by JS -->
            </div>

            <div id="cartSummarySection">
                <div class="cart-summary" id="cartSummary">
                    <div class="summary-row">
                        <span class="label">SUBTOTAL</span>
                        <span class="value" id="subtotalVal">Rp0</span>
                    </div>
                    <div class="summary-row">
                        <span class="label">ESTIMATED SHIPPING</span>
                        <span class="value-light">Dihitung saat checkout</span>
                    </div>
                    <div class="summary-row total-row">
                        <span class="label-total">Total</span>
                        <span class="value-total" id="totalVal">Rp0</span>
                    </div>
                </div>

                <button class="btn-checkout" onclick="window.location.href='checkout.html'">CHECK OUT &rarr;</button>
            </div>

            <div id="emptySection" class="empty-cart" style="display:none;">
                <div style="font-size:3rem;">🛒</div>
                <p>Keranjang Anda masih kosong.</p>
                <button class="btn-checkout" style="display:inline-block;width:auto;padding:12px 28px;" onclick="window.location.href='katalog.html'">Mulai Belanja</button>
            </div>

            <div class="continue-shopping">
                <a href="katalog.html">&larr; Continue Shopping</a>
            </div>
        </div>
    </div>

    <script>
        // Default cart items (demo data) if sessionStorage is empty
        const defaultCart = [
            { id: 1, name: 'Marning Jagung', variant: 'Original', price: 18000, qty: 1, img: '../image/Harmoni.png' },
            { id: 2, name: 'Kue Kacang',     variant: 'Original', price: 15000, qty: 1, img: '../image/Kue Kacang Original.jpg' },
        ];

        let cart = JSON.parse(sessionStorage.getItem('harmoni_cart') || 'null');
        if (!cart) cart = defaultCart;

        function saveCart() {
            sessionStorage.setItem('harmoni_cart', JSON.stringify(cart));
        }

        function formatRp(n) {
            return 'Rp' + n.toLocaleString('id-ID') + ',00';
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            const summarySection = document.getElementById('cartSummarySection');
            const emptySection = document.getElementById('emptySection');

            if (cart.length === 0) {
                container.innerHTML = '';
                summarySection.style.display = 'none';
                emptySection.style.display = 'block';
                return;
            }

            summarySection.style.display = 'block';
            emptySection.style.display = 'none';

            container.innerHTML = cart.map((item, i) => `
                <div class="cart-item" id="item-${i}">
                    <img src="${item.img}" alt="${item.name}" class="item-img"
                         onerror="this.src='../image/Harmoni.png'">
                    <div class="item-info">
                        <h3>${item.name}</h3>
                        <p class="variant">${item.variant}</p>
                        <p class="price">${formatRp(item.price)}</p>
                    </div>
                    <div class="item-actions">
                        <button class="btn-delete" onclick="removeItem(${i})" title="Hapus">🗑️</button>
                        <div class="qty-control">
                            <button onclick="changeQty(${i}, -1)">-</button>
                            <span id="qty-${i}">${item.qty}</span>
                            <button onclick="changeQty(${i}, 1)">+</button>
                        </div>
                    </div>
                </div>
            `).join('');

            // Update totals
            const subtotal = cart.reduce((s, it) => s + it.price * it.qty, 0);
            document.getElementById('subtotalVal').textContent = formatRp(subtotal);
            document.getElementById('totalVal').textContent = formatRp(subtotal);
        }

        function changeQty(i, delta) {
            cart[i].qty += delta;
            if (cart[i].qty <= 0) {
                if (!confirm('Hapus ' + cart[i].name + ' dari keranjang?')) {
                    cart[i].qty = 1;
                    return;
                }
                cart.splice(i, 1);
            }
            saveCart();
            renderCart();
        }

        function removeItem(i) {
            if (confirm('Hapus ' + cart[i].name + ' dari keranjang?')) {
                cart.splice(i, 1);
                saveCart();
                renderCart();
            }
        }

        renderCart();
    </script>
</body>
</html>
